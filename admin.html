<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - نظام شِفتك</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --color-primary: #38bdf8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-light);
            min-height: 100vh;
            padding: 30px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 550px; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 28px; font-weight: 900; color: var(--color-primary); margin-bottom: 6px; }
        .header p { font-size: 14px; color: var(--text-muted); }

        .card {
            background: var(--card-bg); border: 1px solid var(--card-border);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 24px; padding: 24px; margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .card h2 { font-size: 16px; margin-bottom: 18px; color: #cbd5e1; border-bottom: 1px solid rgba(255, 255, 255, 0.08); padding-bottom: 8px; }
        label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; color: #cbd5e1; }

        select, input[type="date"] {
            width: 100%; padding: 14px 16px; background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 14px;
            color: #fff; font-family: 'Tajawal', sans-serif; font-size: 15px; outline: none; margin-bottom: 18px;
        }

        .group-row { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); padding: 16px; border-radius: 14px; margin-bottom: 14px; }

        .btn {
            width: 100%; padding: 15px; background: linear-gradient(to left, #38bdf8, #818cf8);
            border: none; border-radius: 14px; color: #fff; font-size: 16px; font-weight: 700; cursor: pointer;
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .alert { padding: 15px; border-radius: 14px; text-align: center; font-size: 14px; display: none; margin-bottom: 20px; line-height: 1.5; }
        .alert-success { background: rgba(16, 185, 129, 0.15); border: 1px solid rgba(16, 185, 129, 0.3); color: #a7f3d0; }
        .alert-danger { background: rgba(248, 113, 113, 0.15); border: 1px solid rgba(248, 113, 113, 0.3); color: #fca5a5; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>لوحة التحكم</h1>
        <p>إدخال وحفظ التواريخ المرجعية للمجموعات</p>
    </div>

    <div class="alert alert-success" id="saveAlert">✅ تم حفظ الإعدادات وتحديث الجدول بنجاح!</div>
    <div class="alert alert-danger" id="conflictAlert">⚠️ تعارض منع الحفظ!</div>

    <div class="card">
        <h2>1. نوع النظام</h2>
        <select id="systemType" onchange="renderDynamicFields()">
            <option value="5">نظام 5 مجموعات (أول يوم صباح مستقل لكل مجموعة)</option>
            <option value="6">نظام 6 مجموعات (التوليد التلقائي بناءً على مجموعة A)</option>
        </select>
    </div>

    <div class="card">
        <h2>2. ضبط التواريخ المرجعية</h2>
        <div id="dynamicInputsContainer"></div>
    </div>

    <button class="btn" id="saveBtn" onclick="saveConfiguration()">حفظ وتثبيت الجدول 💾</button>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://rksti-29fc8-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const definitions = {
        "5": [
            { id: "g1", name: "المجموعة الأولى (Group 1)" },
            { id: "g2", name: "المجموعة الثانية (Group 2)" },
            { id: "g3", name: "المجموعة الثالثة (Group 3)" },
            { id: "g4", name: "المجموعة الرابعة (Group 4)" },
            { id: "g5", name: "المجموعة الخامسة (Group 5)" }
        ],
        "6": [
            { id: "g1", name: "مجموعة A" }, { id: "g2", name: "مجموعة B" },
            { id: "g3", name: "مجموعة C" }, { id: "g4", name: "مجموعة D" },
            { id: "g5", name: "مجموعة E" }, { id: "g6", name: "مجموعة F" }
        ]
    };

    const offsets6 = { "g1": 0, "g2": 4, "g3": 8, "g4": 12, "g5": 16, "g6": 20 };

    const cycle5 = [
        { name: "☀️ صباح (أول يوم)", type: "morning" }, { name: "☀️ صباح (ثاني يوم)", type: "morning" },
        { name: "🌆 ظهر (أول يوم)", type: "afternoon" }, { name: "🌆 ظهر (ثاني يوم)", type: "afternoon" },
        { name: "🌙 ليل (أول يوم)", type: "evening" }, { name: "🌙 ليل (ثاني يوم)", type: "evening" },
        { name: "🌿 راحة (أوف)", type: "off" }, { name: "🌿 راحة (أوف)", type: "off" },
        { name: "🌿 راحة (أوف)", type: "off" }, { name: "🌿 راحة (أوف)", type: "off" }
    ];

    function renderDynamicFields() {
        const systemType = document.getElementById('systemType').value;
        const container = document.getElementById('dynamicInputsContainer');
        container.innerHTML = '';
        hideAlerts();

        if (systemType === "5") {
            definitions["5"].forEach(g => {
                const div = document.createElement('div');
                div.className = 'group-row';
                div.innerHTML = `<label for="date_${g.id}">تاريخ أول صباح لـ ${g.name}:</label><input type="date" id="date_${g.id}" required>`;
                container.appendChild(div);
            });
        } else {
            const firstGroup = definitions["6"][0];
            const div = document.createElement('div');
            div.className = 'group-row';
            div.innerHTML = `<label for="date_${firstGroup.id}">تاريخ أول صباح لـ ${firstGroup.name}:</label><input type="date" id="date_${firstGroup.id}" required>`;
            container.appendChild(div);
        }
        container.querySelectorAll('input[type="date"]').forEach(input => { if(!input.value) input.valueAsDate = new Date(); });
    }

    function hideAlerts() {
        document.getElementById('saveAlert').style.display = 'none';
        document.getElementById('conflictAlert').style.display = 'none';
    }

    function validateConflicts(generatedGroups) {
        const simulationDays = 100; const today = new Date();
        for (let i = 0; i < simulationDays; i++) {
            let checkDate = new Date(today); checkDate.setDate(today.getDate() + i);
            let dateStr = checkDate.toISOString().split('T')[0];
            let dailyLog = { morning: [], afternoon: [], evening: [] };

            for (let group of generatedGroups) {
                let baseDate = new Date(group.baseDate);
                let diffDays = Math.floor((checkDate - baseDate) / (1000 * 60 * 60 * 24));
                if (diffDays >= 0) {
                    let currentShift = cycle5[diffDays % 10];
                    if (currentShift.type !== 'off') dailyLog[currentShift.type].push(group.name);
                }
            }
            if (dailyLog.morning.length > 1) return { hasConflict: true, date: dateStr, shift: "الصباح ☀️", groups: dailyLog.morning };
            if (dailyLog.afternoon.length > 1) return { hasConflict: true, date: dateStr, shift: "الظهر 🌆", groups: dailyLog.afternoon };
            if (dailyLog.evening.length > 1) return { hasConflict: true, date: dateStr, shift: "الليل 🌙", groups: dailyLog.evening };
        }
        return { hasConflict: false };
    }

    function fetchCurrentConfig() {
        database.ref('shift_system_config').once('value').then((snapshot) => {
            const val = snapshot.val();
            if(val) {
                document.getElementById('systemType').value = val.systemType;
                renderDynamicFields();
                if(val.systemType === "5") {
                    val.groups.forEach(g => {
                        const el = document.getElementById(`date_${g.id}`);
                        if(el) el.value = g.baseDate;
                    });
                } else {
                    const el = document.getElementById(`date_g1`);
                    if(el) el.value = val.groups[0].baseDate;
                }
            }
        });
    }

    function saveConfiguration() {
        hideAlerts();
        const systemType = document.getElementById('systemType').value;
        const generatedGroups = [];
        let cycle = [];
        const saveBtn = document.getElementById('saveBtn');

        if (systemType === "5") {
            for (let g of definitions["5"]) {
                const dateVal = document.getElementById(`date_${g.id}`).value;
                if (!dateVal) { alert(`الرجاء تحديد التاريخ لـ ${g.name}`); return; }
                generatedGroups.push({ id: g.id, name: g.name, baseDate: dateVal });
            }
            const conflictCheck = validateConflicts(generatedGroups);
            if (conflictCheck.hasConflict) {
                const dangerBox = document.getElementById('conflictAlert');
                dangerBox.innerHTML = `⚠️ <strong>تعارض منع الحفظ!</strong> تداخل في وردية (${conflictCheck.shift}) بتاريخ ${conflictCheck.date} بين مجموعات: [ ${conflictCheck.groups.join(' و ')} ]`;
                dangerBox.style.display = 'block'; return;
            }
            cycle = cycle5;
        } else {
            const firstInput = document.getElementById(`date_g1`).value;
            if (!firstInput) { alert("الرجاء تحديد تاريخ مجموعة A"); return; }
            const baseDateObj = new Date(firstInput);
            definitions["6"].forEach(g => {
                let tempDate = new Date(baseDateObj); tempDate.setDate(tempDate.getDate() + offsets6[g.id]);
                generatedGroups.push({ id: g.id, name: g.name, baseDate: tempDate.toISOString().split('T')[0] });
            });
            const shiftsOrder = [{ name: "☀️ صباح", type: "morning" }, { name: "🌿 راحة", type: "off" }, { name: "🌆 ظهر", type: "afternoon" }, { name: "🌿 راحة", type: "off" }, { name: "🌙 ليل", type: "evening" }, { name: "🌿 راحة", type: "off" }];
            shiftsOrder.forEach(s => { for (let i = 1; i <= 4; i++) cycle.push({ name: `${s.name} - يوم ${i}`, type: s.type }); });
        }

        saveBtn.disabled = true;
        saveBtn.innerText = "جاري حفظ الإعدادات... ⏳";

        database.ref('shift_system_config').set({ systemType, cycle, groups: generatedGroups })
        .then(() => {
            document.getElementById('saveAlert').style.display = 'block';
            saveBtn.disabled = false; saveBtn.innerText = "حفظ وتثبيت الجدول 💾";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }).catch(err => {
            alert("فشل الحفظ! تأكد من اتصالات الشبكة");
            saveBtn.disabled = false; saveBtn.innerText = "حفظ وتثبيت الجدول 💾";
        });
    }

    window.onload = () => { renderDynamicFields(); fetchCurrentConfig(); };
</script>
</body>
</html>
